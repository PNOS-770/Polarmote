org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256m
android.useAndroidX=true
android.enableJetifier=true

# 构建优化配置
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true
org.gradle.vfs.watch=true

# Kotlin 编译优化
kotlin.incremental=true
kotlin.parallel.tasks.in.project=true
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.jvm.options=-Xmx2g

# Android 构建优化
android.enableR8=true
android.enableD8.desugaring=true

# 代理设置
systemProp.http.proxyHost=127.0.0.1
systemProp.http.proxyPort=7897
systemProp.https.proxyHost=127.0.0.1
systemProp.https.proxyPort=7897

# 避免每次构建都检查依赖更新
systemProp.http.keepAlive=true
systemProp.http.maxConnections=10
systemProp.org.gradle.internal.http.connectionTimeout=30000
systemProp.org.gradle.internal.http.socketTimeout=120000

# 修复APK路径识别问题
# android.enableBuildCache=true  # 已弃用，在AGP 7.0+中移除
# android.buildCacheDir=build-cache  # 已弃用，使用Gradle build cache替代
android.experimental.enableNewResourceProcessing=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
