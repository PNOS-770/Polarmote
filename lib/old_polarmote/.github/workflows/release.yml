name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Windows
        run: flutter build windows --release

      - name: Package
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath Asmote-windows.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Asmote-windows.zip

  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1
        with:
          android: false
          tool-cache: false
          large-packages: false
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973" --sdk_root=${ANDROID_SDK_ROOT} > /dev/null

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Rust Android libraries
        env:
          ASMOTE_ANDROID_ABIS: arm64-v8a
        run: |
          mkdir -p build/app/generated/rustJniLibs
          sh native/asmote_native_core/scripts/build_android_libs.sh \
            --crate-dir "$PWD/native/asmote_native_core" \
            --output-dir "$PWD/build/app/generated/rustJniLibs" \
            --ndk-dir "$ANDROID_SDK_ROOT/ndk/27.0.12077973" \
            --profile release \
            --api-level 21

      - name: Free disk space
        run: |
          rm -rf native/asmote_native_core/target
          rm -rf ~/.cargo/registry
          rm -rf android/.gradle
          df -h /

      - name: Build Android APK
        env:
          ASMOTE_ANDROID_ABIS: arm64-v8a
        run: |
          flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk Asmote-android.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: Asmote-android.apk

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-build/Asmote-windows.zip
            android-build/Asmote-android.apk
          generate_release_notes: true
