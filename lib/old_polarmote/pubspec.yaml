name: asmote
version: 1.0.3+3
publish_to: none

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  safe_layout_x:
    path: packages/safe_layout_x
  provider: ^6.1.2
  dartssh2: ^2.13.0
  file_selector: ^1.0.3
  super_drag_and_drop: ^0.9.1
  super_clipboard: ^0.9.1
  super_native_extensions: ^0.9.1
  path: ^1.9.0
  archive: ^3.6.1
  crypto: ^3.0.7
  path_provider: ^2.1.2
  open_filex: ^4.5.0
  ffi: ^2.1.3
  package_info_plus: ^9.0.0
  flutter_secure_storage: ^9.2.4
  flutter_secure_storage_platform_interface: ^1.1.2
  flutter_svg: ^2.0.17
  permission_handler: ^12.0.1
  flutter_local_notifications: ^20.1.0
  flutter_libserialport: ^0.6.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  pdfrx: ^1.3.5
  xterm:
    path: packages/xterm
  dio: ^5.7.0
  flutter_markdown: ^0.7.6
  window_manager: ^0.4.3
  system_tray: 0.1.1
  fl_chart: ^0.70.2
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  file_selector_android:
    path: third_party/file_selector_android

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/ui_actions/
    - assets/icons/vscode/
    - assets/ai_model_presets.json
